services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: flashcard-mongodb-prod
    restart: always
    environment:
      MONGO_INITDB_DATABASE: flashcard
    volumes:
      - mongodb_data:/data/db
    networks:
      - shared-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/flashcard --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flashcard-backend-prod
    restart: always
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/flashcard
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=8192
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=https://flash.saeedkhosravi.it/api/auth/google/callback
      - FRONTEND_URL=https://flash.saeedkhosravi.it
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - shared-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: npm start

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=https://flash.saeedkhosravi.it
    container_name: flashcard-frontend-prod
    restart: always
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - shared-network

volumes:
  mongodb_data:
    driver: local

networks:
  shared-network:
    external: true

