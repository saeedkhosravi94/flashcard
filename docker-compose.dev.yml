# Development Docker Compose Configuration
# Use this for development with hot reloading

services:
  mongodb:
    image: mongo:7.0
    container_name: flashcard-mongodb-dev
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: flashcard
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data_dev:/data/db
    networks:
      - flashcard-network-dev

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flashcard-backend-dev
    restart: unless-stopped
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/flashcard
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - NODE_ENV=development
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads
    depends_on:
      - mongodb
    networks:
      - flashcard-network-dev
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: flashcard-frontend-dev
    restart: unless-stopped
    environment:
      - CHOKIDAR_USEPOLLING=true
      - REACT_APP_BACKEND_URL=http://backend:5000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - flashcard-network-dev
    stdin_open: true
    tty: true

volumes:
  mongodb_data_dev:
    driver: local

networks:
  flashcard-network-dev:
    driver: bridge

