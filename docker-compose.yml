services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: flashcard-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: flashcard
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - flashcard-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/flashcard --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flashcard-backend
    restart: unless-stopped
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/flashcard
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - NODE_ENV=development
      - NODE_OPTIONS=--max-old-space-size=8192
      - JWT_SECRET=${JWT_SECRET:-your-default-jwt-secret-change-in-production}
      - SESSION_SECRET=${SESSION_SECRET:-your-default-session-secret-change-in-production}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - FRONTEND_URL=http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - flashcard-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: npm run dev

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: flashcard-frontend
    restart: unless-stopped
    environment:
      - CHOKIDAR_USEPOLLING=true
      - DOCKER_ENV=true
      - REACT_APP_BACKEND_URL=http://backend:5000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - flashcard-network
    stdin_open: true
    tty: true

volumes:
  mongodb_data:
    driver: local

networks:
  flashcard-network:
    driver: bridge

